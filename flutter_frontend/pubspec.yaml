name: book_study_companion
description: An AI-powered book study and interactive tutoring companion mobile application.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # State Management
  flutter_bloc: ^8.1.3
  
  # Dependency Injection & Service Locator
  get_it: ^7.6.0
  
  # Functional Programming & Monads
  dartz: ^0.10.1
  
  # Network & API
  dio: ^5.4.0
  
  # Firebase Core & Ecosystem
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.3
  firebase_storage: ^11.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
